<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon.ico" />
    <title>GreatFrontEnd Hero Section - Simple</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <a href="#main" class="skip visually-hidden">Skip to main content</a>
    <main id="main">
      <section class="hero">
        <div class="wrapper hero__wrapper">
          <div class="hero__text">
            <h1 class="hero__title">Well crafted abstract images</h1>
            <p class="hero__subtitle">High quality abstract images for your projects, wallpaper and presentations.</p>
            <div class="hero__buttons">
              <button class="btn btn--light">Learn more</button>
              <button class="btn btn--primary">See pricing</button>
            </div>
            <!-- /.hero__buttons -->
          </div>
          <!-- /.hero__text -->
          <div class="hero__image">
            <img src="./assets/images/prism.png" alt="A stack of four tabs with abstract images" />
          </div>
          <!-- /.hero__image -->
        </div>
        <!-- /.wrapper hero__wrapper -->
      </section>
      <!-- /.hero -->
    </main>
  </body>
</html>
